<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kairos Admin Blog Publisher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./publisher.css" />
  </head>
  <body>
    <main class="publisher">
      <section class="publisher__shell">
        <header class="publisher__header">
          <p class="publisher__eyebrow">Kairos Summit</p>
          <h1 class="publisher__title">Admin Blog Publisher</h1>
          <p class="publisher__subtitle">
            Create blog entries for featured banner, recent stories cards, and full post details.
            Submit directly to your database endpoint.
          </p>
        </header>

        <form id="blogPublisherForm" class="publisher__form" novalidate>
          <section class="panel">
            <h2 class="panel__title">Top Story Header</h2>
            <div class="grid grid--2">
              <label class="field">
                <span class="field__label">Cover Image*</span>
                <input id="topHeaderImageFile" name="topHeaderImageFile" type="file" accept="image/*" />
              </label>
              <label class="field">
                <span class="field__label">Title*</span>
                <input id="topHeaderTitle" name="topHeaderTitle" type="text" placeholder="Know more Kairos? Read our blog" />
              </label>
              <label class="field">
                <span class="field__label">Excerpt*</span>
                <textarea id="topHeaderExcerpt" name="topHeaderExcerpt" rows="3" placeholder="Kairos Summit 2025..."></textarea>
              </label>
              <label class="field">
                <span class="field__label">Status*</span>
                <select id="topHeaderStatus" name="topHeaderStatus">
                  <option value="published">Published</option>
                  <option value="draft">Draft</option>
                </select>
              </label>
              <label class="field" style="grid-column: 1 / -1;">
                <span class="field__label">Content*</span>
                <textarea id="topHeaderContent" name="topHeaderContent" rows="5" placeholder="Full body..."></textarea>
              </label>
            </div>
            <div class="panel__actions">
              <button type="button" id="publishTopHeaderBtn" class="btn btn--primary">Publish Top Story Header</button>
              <p id="topHeaderMessage" class="message" aria-live="polite"></p>
            </div>
          </section>

          <section class="panel">
            <h2 class="panel__title">Blog Payload (/api/blogs)</h2>
            <div class="grid grid--3">
              <label class="field">
                <span class="field__label">Title*</span>
                <input id="postTitle" name="postTitle" type="text" placeholder="Growing Deep, Not Just Loud" required />
              </label>
              <label class="field">
                <span class="field__label">Category*</span>
                <select id="postCategory" name="postCategory" required>
                  <option value="">Select category</option>
                  <option value="Spiritual Growth">Spiritual Growth</option>
                  <option value="Faith & Culture">Faith & Culture</option>
                  <option value="Leadership">Leadership</option>
                  <option value="Purpose">Purpose</option>
                  <option value="Community">Community</option>
                  <option value="Formation">Formation</option>
                </select>
              </label>
              <label class="field">
                <span class="field__label">Status*</span>
                <select id="postStatus" name="postStatus" required>
                  <option value="draft">Draft</option>
                  <option value="published">Published</option>
                </select>
              </label>
              <label class="field">
                <span class="field__label">Cover Image*</span>
                <input id="postCoverImageFile" name="postCoverImageFile" type="file" accept="image/*" required />
              </label>
            </div>
            <label class="field">
              <span class="field__label">Excerpt*</span>
              <textarea id="postExcerpt" name="postExcerpt" rows="3" placeholder="Teachings and reflections to help you build spiritual depth." required></textarea>
            </label>
            <label class="field">
              <span class="field__label">Content*</span>
              <textarea id="postContent" name="postContent" rows="8" placeholder="Full post body here..." required></textarea>
            </label>
          </section>

          <section class="panel">
            <h2 class="panel__title">Live Content Preview</h2>
            <article class="preview-card" id="payloadPreview">
              <div class="preview-card__media-wrap">
                <img id="previewCoverImage" class="preview-card__media" alt="Cover preview" />
              </div>
              <div class="preview-card__body">
                <p id="previewCategory" class="preview-card__category">Category</p>
                <h3 id="previewTitle" class="preview-card__title">Post title preview</h3>
                <p id="previewExcerpt" class="preview-card__excerpt">Excerpt preview</p>
                <div id="previewTags" class="preview-card__tags"></div>
                <p id="previewStatus" class="preview-card__status">Status: draft</p>
                <p id="previewContent" class="preview-card__content"></p>
              </div>
            </article>
          </section>

          <div class="actions">
            <button type="button" id="saveDraftBtn" class="btn btn--ghost">Save local draft</button>
            <button type="button" id="clearDraftBtn" class="btn btn--ghost">Clear draft</button>
            <button type="submit" id="publishBtn" class="btn btn--primary">Publish to database</button>
          </div>
          <p id="formMessage" class="message" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="./publisher.js"></script>
  </body>
</html>
